<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>links.// にじ</title>
<meta name="description" content="Мои соцсети и ссылки">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     🔗 ССЫЛКИ настраиваются в JS внизу файла (объект LINKS)
     🖼️ СТИКЕРЫ-ПЕРСОНАЖИ настраиваются в объекте STICKERS там же
     ============================================================ */

  :root{
    --bg-0:#120c1c;
    --bg-1:#1d1530;
    --bg-2:#261a38;
    --ink:#f1ecf5;
    --ink-soft:#a99cbd;
    --pink:#e8779c;
    --lav:#9a7cd6;
    --cyan:#5fc9c2;
    --card-bg:rgba(26,18,40,0.62);
    --card-border:rgba(255,255,255,0.10);
    --radius:16px;
    --shadow: 0 24px 60px rgba(6,3,14,0.6);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100svh;
    min-height:100vh;
    background:
      radial-gradient(ellipse 80% 55% at 15% -5%, rgba(232,119,156,0.10), transparent 60%),
      radial-gradient(ellipse 70% 55% at 100% 10%, rgba(95,201,194,0.07), transparent 55%),
      linear-gradient(180deg, rgba(10,6,16,0.55), rgba(14,9,22,0.72) 55%, rgba(10,6,16,0.85)),
      url("https://i.pinimg.com/736x/71/1d/54/711d54d467bc67042ef26b3e5ac74e51.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family:"Nunito", sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 18px;
    position:relative;
    overflow-x:hidden;
  }

  /* --- лепестки: реже и тише --- */
  #petals{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .petal{
    position:absolute;
    top:-10%;
    width:11px;
    height:11px;
    opacity:.4;
    will-change:transform;
    animation:fall linear infinite;
  }
  .petal svg{width:100%;height:100%;display:block;}
  @keyframes fall{
    0%{ transform:translate3d(0,-10vh,0) rotate(0deg); }
    100%{ transform:translate3d(var(--drift,30px), 110vh, 0) rotate(220deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .petal{animation:none; display:none;}
  }

  /* --- стикеры персонажей вокруг карточки --- */
  #stickers{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }
  .sticker{
    position:absolute;
    filter:drop-shadow(0 14px 26px rgba(0,0,0,0.5)) saturate(0.94);
    animation:hover-float 6s ease-in-out infinite;
    opacity:.92;
  }
  .sticker img{
    display:block;
    height:100%;
    width:auto;
  }
  @keyframes hover-float{
    0%,100%{ transform:translateY(0) rotate(var(--rot,0deg)); }
    50%{ transform:translateY(-12px) rotate(var(--rot,0deg)); }
  }
  @media (prefers-reduced-motion: reduce){
    .sticker{animation:none;}
  }
  @media (max-width:900px){
    .sticker{ display:none; }
  }

  /* --- карточка: скругления скромнее, рамка тише --- */
  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:396px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    box-shadow:var(--shadow);
    padding:36px 26px 26px;
    text-align:center;
    isolation:isolate;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:calc(var(--radius) + 1px);
    padding:1px;
    background:linear-gradient(135deg, var(--pink), var(--lav) 55%, var(--cyan));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    z-index:-1;
    opacity:.35;
  }

  /* --- аватар: тоньше кольцо, без блёсток --- */
  .avatar-wrap{
    position:relative;
    width:120px;
    height:120px;
    margin:0 auto 18px;
  }
  .avatar-ring{
    position:absolute;
    inset:-2px;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--pink), var(--cyan), var(--lav), var(--pink));
    opacity:.75;
  }
  .avatar-inner{
    position:absolute;
    inset:2px;
    border-radius:50%;
    background:var(--bg-1);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .avatar-inner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .avatar-inner .fallback{
    font-size:44px;
    opacity:.85;
  }

  .name{
    font-family:"Outfit", sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:.01em;
    margin:0 0 6px;
    color:var(--ink);
  }
  .name .accent{
    color:var(--pink);
  }
  .tagline{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0 0 26px;
    line-height:1.55;
  }

  /* --- список ссылок: спокойнее hover, меньше скругление --- */
  .links{
    display:flex;
    flex-direction:column;
    gap:10px;
    list-style:none;
    padding:0;
    margin:0;
  }
  .link-item a{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 17px;
    border-radius:12px;
    text-decoration:none;
    color:var(--ink);
    font-weight:600;
    font-size:14.5px;
    background:rgba(255,255,255,0.035);
    border:1px solid rgba(255,255,255,0.09);
    overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
  }
  .link-item a::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, var(--lc, var(--pink)), transparent 70%);
    opacity:0;
    transition:opacity .15s ease;
  }
  .link-item a:hover,
  .link-item a:focus-visible{
    transform:translateY(-1px);
    border-color:var(--lc, var(--pink));
    background:rgba(255,255,255,0.055);
    box-shadow:0 8px 20px -10px var(--lc, var(--pink));
  }
  .link-item a:hover::before,
  .link-item a:focus-visible::before{ opacity:.10; }
  .link-item a:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; }

  .link-icon{
    width:23px;
    height:23px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--lc, var(--pink));
  }
  .link-icon svg{ width:100%; height:100%; }
  .link-label{
    flex:1;
    text-align:left;
    font-family:"Outfit", sans-serif;
    font-weight:600;
    font-size:14.5px;
    letter-spacing:.01em;
  }
  .link-arrow{ opacity:.4; font-size:13px; transition:transform .15s ease, opacity .15s ease; }
  .link-item a:hover .link-arrow{ transform:translateX(3px); opacity:.85; }

  footer{
    margin-top:24px;
    font-size:11px;
    letter-spacing:.06em;
    color:var(--ink-soft);
    opacity:.55;
  }

  @media (max-width:380px){
    .card{ padding:28px 18px 22px; }
    .avatar-wrap{ width:104px; height:104px; }
  }
</style>
</head>
<body>

<div id="petals"></div>
<div id="stickers"></div>

<main class="card">
  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="avatar-inner">
      <!-- 🖼️ Замени avatar.png на своё изображение (квадратное) -->
      <img src="avatar.png" alt="Аватар" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="fallback" style="display:none;">羽</div>
    </div>
  </div>

  <h1 class="name">Бᥱ᧘κᥲ</h1>
  <p class="tagline">короткая фраза о себе</p>

  <ul class="links" id="links-list"></ul>

  <footer>connect · 2026</footer>
</main>

<script>
/* ============================================================
   🔗 ССЫЛКИ — редактируй только этот массив
   Добавить — скопируй один объект { ... } и вставь новый
   Удалить — сотри соответствующий объект { ... }
   icon: "tiktok" | "discord" | "telegram" | "youtube" | "instagram"
       | "twitter" | "twitch" | "vk" | "link"
   ============================================================ */
const LINKS = [
  { name: "GitHub",         url: "https://github.com/belka-developer", icon: "tiktok",   color: "#e8779c" },
  { name: "Discord сервер", url: "https://discord.gg/dw65R5Mvft",   icon: "discord",  color: "#9a7cd6" },
  { name: "TikTok",         url: "https://www.tiktok.com/@haus_soda", icon: "tiktok",   color: "#e8779c" },
  { name: "Telegram канал", url: "https://t.me/norka_belki",          icon: "telegram", color: "#5fc9c2" },
];

/* ============================================================
   🖼️ СТИКЕРЫ-ПЕРСОНАЖИ — декоративные PNG по бокам карточки.
   Положи свои файлы (с прозрачным фоном) рядом с index.html
   и пропиши их имена ниже — например asuna.png, senko.png, marin.png.
   Если файла нет — стикер просто не покажется.
   ============================================================ */
const STICKERS = [
  { src: "asuna.png",  height: 520, top: "10%", left: "3%",  rotate: -4 },
  { src: "senko.png",  height: 420, top: "50%", left: "1%",  rotate: 3  },
  { src: "marin.png",  height: 520, top: "14%", left: "auto", right: "3%", rotate: 4 },
];

const ICONS = {
  tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.4 2.2 2 3.9 4.4 4.2v3c-1.6 0-3.1-.5-4.4-1.4v6.8c0 3.5-2.8 6.4-6.4 6.4S3.7 18.1 3.7 14.6c0-3.4 2.6-6.1 6-6.4v3.1c-1.6.3-2.9 1.7-2.9 3.3 0 1.9 1.5 3.4 3.4 3.4s3.4-1.5 3.4-3.4V3h2.9z"/></svg>',
  discord: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 5.4C18.9 4.7 17.4 4.2 15.9 4c-.2.4-.4.8-.6 1.3-1.6-.2-3.2-.2-4.8 0-.1-.5-.3-.9-.6-1.3-1.5.2-3 .7-4.4 1.4C2.9 9 2.2 12.5 2.5 16c1.7 1.3 3.3 2 4.9 2.5.4-.5.7-1.1 1-1.7-.6-.2-1.1-.5-1.6-.8.1-.1.3-.2.4-.3 3.1 1.4 6.4 1.4 9.4 0 .1.1.3.2.4.3-.5.3-1.1.6-1.6.8.3.6.6 1.2 1 1.7 1.6-.5 3.2-1.2 4.9-2.5.4-4-.6-7.5-2.5-10.6zM9.3 13.8c-.9 0-1.7-.9-1.7-1.9s.7-1.9 1.7-1.9 1.7.9 1.7 1.9-.8 1.9-1.7 1.9zm5.4 0c-.9 0-1.7-.9-1.7-1.9s.7-1.9 1.7-1.9 1.7.9 1.7 1.9-.8 1.9-1.7 1.9z"/></svg>',
  telegram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.6 18.6 20c-.2 1-1 1.2-1.8.8l-5-3.7-2.4 2.3c-.3.3-.5.5-1 .5l.4-5.1L18.4 6.6c.4-.4-.1-.6-.6-.2L6.7 13.6l-5-1.6c-1-.3-1-1 .2-1.5L20.6 3.6c.9-.3 1.6.2 1.3 1z"/></svg>',
  youtube: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12s0-3.2-.4-4.7c-.2-.9-.9-1.6-1.8-1.8C18.2 5 12 5 12 5s-6.2 0-7.8.5c-.9.2-1.6.9-1.8 1.8C2 8.8 2 12 2 12s0 3.2.4 4.7c.2.9.9 1.6 1.8 1.8C5.8 19 12 19 12 19s6.2 0 7.8-.5c.9-.2 1.6-.9 1.8-1.8.4-1.5.4-4.7.4-4.7zM10 15V9l5.2 3-5.2 3z"/></svg>',
  instagram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c2.7 0 3.1 0 4.1.1 1.1 0 1.8.2 2.5.5.7.3 1.2.6 1.7 1.1.5.5.9 1 1.1 1.7.3.7.5 1.4.5 2.5.1 1 .1 1.4.1 4.1s0 3.1-.1 4.1c0 1.1-.2 1.8-.5 2.5-.3.7-.6 1.2-1.1 1.7-.5.5-1 .9-1.7 1.1-.7.3-1.4.5-2.5.5-1 .1-1.4.1-4.1.1s-3.1 0-4.1-.1c-1.1 0-1.8-.2-2.5-.5-.7-.3-1.2-.6-1.7-1.1-.5-.5-.9-1-1.1-1.7-.3-.7-.5-1.4-.5-2.5C2 15.1 2 14.7 2 12s0-3.1.1-4.1c0-1.1.2-1.8.5-2.5.3-.7.6-1.2 1.1-1.7.5-.5 1-.9 1.7-1.1.7-.3 1.4-.5 2.5-.5C8.9 2 9.3 2 12 2zm0 1.8c-2.6 0-3 0-4 .1-.9 0-1.4.2-1.7.3-.4.2-.7.4-1 .7-.3.3-.5.6-.7 1-.1.3-.3.8-.3 1.7-.1 1-.1 1.4-.1 4s0 3 .1 4c0 .9.2 1.4.3 1.7.2.4.4.7.7 1 .3.3.6.5 1 .7.3.1.8.3 1.7.3 1 .1 1.4.1 4 .1s3 0 4-.1c.9 0 1.4-.2 1.7-.3.4-.2.7-.4 1-.7.3-.3.5-.6.7-1 .1-.3.3-.8.3-1.7.1-1 .1-1.4.1-4s0-3-.1-4c0-.9-.2-1.4-.3-1.7-.2-.4-.4-.7-.7-1-.3-.3-.6-.5-1-.7-.3-.1-.8-.3-1.7-.3-1-.1-1.4-.1-4-.1zm0 4.5a3.7 3.7 0 1 1 0 7.4 3.7 3.7 0 0 1 0-7.4zm0 1.8a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 0 0 0-3.8zm4.6-2a.9.9 0 1 1 0 1.8.9.9 0 0 1 0-1.8z"/></svg>',
  twitter: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.2 3h3.2l-7 8 8.2 10h-6.4l-5-6.5L4.9 21H1.7l7.5-8.6L1.3 3h6.6l4.5 6z"/></svg>',
  twitch: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 2 2.5 6v13h5V21l3-2h4l5-5V2H4zm14.5 11-3 3h-4l-3 2v-2H5.5V3.5h13V13z"/><path d="M15 6.5h1.8v5H15zM10.5 6.5h1.8v5h-1.8z"/></svg>',
  vk: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.2 17.5c-6.5 0-10.2-4.5-10.4-11.9h3.3c.1 5.4 2.5 7.7 4.3 8.1V5.6h3.1v4.7c1.8-.2 3.7-2.3 4.3-4.7h3.1c-.5 2.9-2.6 5-4.1 5.9 1.5.7 3.9 2.6 4.8 5.9h-3.4c-.7-2.3-2.4-4-4.7-4.3v4.3h-.3z"/></svg>',
  link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1-1"/></svg>'
};

function renderLinks(){
  const list = document.getElementById('links-list');
  list.innerHTML = '';
  LINKS.forEach(link => {
    const li = document.createElement('li');
    li.className = 'link-item';
    const iconSvg = ICONS[link.icon] || ICONS.link;
    li.innerHTML = `
      <a href="${link.url}" target="_blank" rel="noopener noreferrer" style="--lc:${link.color || '#e8779c'}">
        <span class="link-icon">${iconSvg}</span>
        <span class="link-label">${link.name}</span>
        <span class="link-arrow">→</span>
      </a>`;
    list.appendChild(li);
  });
}
renderLinks();

function renderStickers(){
  const wrap = document.getElementById('stickers');
  STICKERS.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'sticker';
    div.style.top = s.top || '10%';
    if (s.right !== undefined){
      div.style.right = s.right;
    } else {
      div.style.left = s.left || '5%';
    }
    div.style.height = (s.height || 480) + 'px';
    div.style.setProperty('--rot', (s.rotate || 0) + 'deg');
    div.style.animationDelay = (i * 0.6) + 's';

    const img = document.createElement('img');
    img.src = s.src;
    img.alt = '';
    img.onerror = () => { div.style.display = 'none'; };
    div.appendChild(img);
    wrap.appendChild(div);
  });
}
renderStickers();

/* лепестки — тихий фон */
(function petals(){
  const wrap = document.getElementById('petals');
  const count = window.innerWidth < 500 ? 6 : 10;
  const petalSvg = '<svg viewBox="0 0 20 20"><path fill="currentColor" d="M10 0C10 6 14 8 20 10c-6 2-10 4-10 10C10 14 6 12 0 10c6-2 10-4 10-10z"/></svg>';
  const colors = ['var(--pink)','var(--lav)','var(--cyan)'];
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random()*100 + 'vw';
    p.style.color = colors[i % colors.length];
    p.style.opacity = (0.25 + Math.random()*0.25).toFixed(2);
    const size = 8 + Math.random()*7;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.setProperty('--drift', (Math.random()*80 - 40) + 'px');
    p.style.animationDuration = (11 + Math.random()*10) + 's';
    p.style.animationDelay = (Math.random()*12) + 's';
    p.innerHTML = petalSvg;
    wrap.appendChild(p);
  }
})();
</script>
</body>
</html>
