<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にじの部屋 — мои ссылки</title>
<meta name="description" content="Мои соцсети и ссылки">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     🌸 НАСТРОЙКИ ССЫЛОК — редактируй только этот блок в JS ниже
     Ищи объект LINKS в конце файла (перед </body>)
     ============================================================ */

  :root{
    --bg-0:#150c22;
    --bg-1:#241536;
    --bg-2:#341b45;
    --ink:#f7ecf9;
    --ink-soft:#cdb9dd;
    --pink:#ff8fb3;
    --pink-deep:#ff5f96;
    --lav:#b48cf0;
    --cyan:#7de8e0;
    --card-bg:rgba(35,22,52,0.55);
    --card-border:rgba(255,255,255,0.14);
    --radius:26px;
    --shadow: 0 20px 60px rgba(10,4,20,0.55);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100svh;
    min-height:100vh;
    background:
      radial-gradient(ellipse 90% 60% at 20% -10%, rgba(255,143,179,0.20), transparent 60%),
      radial-gradient(ellipse 80% 60% at 100% 10%, rgba(125,232,224,0.14), transparent 55%),
      radial-gradient(ellipse 70% 60% at 50% 120%, rgba(180,140,240,0.22), transparent 60%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
    background-attachment: fixed;
    font-family:"Nunito", sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 18px;
    position:relative;
    overflow-x:hidden;
  }

  /* --- лепестки сакуры (ambient motion) --- */
  #petals{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .petal{
    position:absolute;
    top:-10%;
    width:16px;
    height:16px;
    opacity:.75;
    will-change:transform;
    animation:fall linear infinite;
  }
  .petal svg{width:100%;height:100%;display:block;}
  @keyframes fall{
    0%{ transform:translate3d(0,-10vh,0) rotate(0deg); }
    100%{ transform:translate3d(var(--drift,40px), 110vh, 0) rotate(360deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .petal{animation:none; display:none;}
  }

  /* --- карточка --- */
  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:400px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow:var(--shadow);
    padding:38px 26px 30px;
    text-align:center;
    isolation:isolate;
  }

  /* мерцающая радужная рамка-обводка */
  .card::before{
    content:"";
    position:absolute;
    inset:-1.5px;
    border-radius:calc(var(--radius) + 1.5px);
    padding:1.5px;
    background:conic-gradient(from var(--ang,0deg), var(--pink), var(--lav), var(--cyan), var(--pink));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    z-index:-1;
    opacity:.55;
    animation:spin 7s linear infinite;
  }
  @keyframes spin{ to{ --ang:360deg; } }
  @property --ang{ syntax:'<angle>'; inherits:false; initial-value:0deg; }

  /* --- аватар --- */
  .avatar-wrap{
    position:relative;
    width:132px;
    height:132px;
    margin:0 auto 18px;
  }
  .avatar-ring{
    position:absolute;
    inset:-8px;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--pink), var(--cyan), var(--lav), var(--pink));
    animation:spin-ring 6s linear infinite;
    filter:blur(0.3px);
  }
  @keyframes spin-ring{ to{ transform:rotate(360deg); } }
  .avatar-inner{
    position:absolute;
    inset:6px;
    border-radius:50%;
    background:var(--bg-1);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .avatar-inner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .avatar-inner .fallback{
    font-size:52px;
  }
  .sparkle{
    position:absolute;
    font-size:20px;
    animation:twinkle 2.4s ease-in-out infinite;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.6));
  }
  .sparkle.s1{ top:-2px; right:2px; animation-delay:0s; }
  .sparkle.s2{ bottom:6px; left:-10px; font-size:14px; animation-delay:.8s; }
  @keyframes twinkle{
    0%,100%{ transform:scale(0.8); opacity:.5; }
    50%{ transform:scale(1.15); opacity:1; }
  }

  .name{
    font-family:"Zen Maru Gothic", sans-serif;
    font-weight:900;
    font-size:24px;
    letter-spacing:.02em;
    margin:2px 0 4px;
    background:linear-gradient(90deg, var(--pink), var(--lav) 55%, var(--cyan));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .tagline{
    font-size:14.5px;
    color:var(--ink-soft);
    margin:0 0 26px;
    line-height:1.5;
  }

  /* --- список ссылок --- */
  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
    list-style:none;
    padding:0;
    margin:0;
  }
  .link-item a{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 18px;
    border-radius:16px;
    text-decoration:none;
    color:var(--ink);
    font-weight:700;
    font-size:15px;
    background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.12);
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
  }
  .link-item a::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, var(--lc, var(--pink)), transparent 70%);
    opacity:0;
    transition:opacity .18s ease;
  }
  .link-item a:hover,
  .link-item a:focus-visible{
    transform:translateY(-2px) scale(1.015);
    border-color:var(--lc, var(--pink));
    box-shadow:0 10px 24px -8px var(--lc, var(--pink));
  }
  .link-item a:hover::before,
  .link-item a:focus-visible::before{ opacity:.16; }
  .link-item a:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; }

  .link-icon{
    width:26px;
    height:26px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--lc, var(--pink));
  }
  .link-icon svg{ width:100%; height:100%; }
  .link-label{ flex:1; text-align:left; }
  .link-arrow{ opacity:.55; font-size:13px; transform:translateX(0); transition:transform .18s ease; }
  .link-item a:hover .link-arrow{ transform:translateX(3px); opacity:.9; }

  footer{
    margin-top:26px;
    font-size:12px;
    color:var(--ink-soft);
    opacity:.7;
  }
  footer span{ color:var(--pink); }

  @media (max-width:380px){
    .card{ padding:30px 18px 24px; }
    .avatar-wrap{ width:112px; height:112px; }
  }
</style>
</head>
<body>

<div id="petals"></div>

<main class="card">
  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="avatar-inner">
      <!-- 🖼️ ЗАМЕНИ avatar.png на своё анимешное пнг-изображение (квадратное, лучше прозрачный фон) -->
      <img src="avatar.png" alt="Аватар" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="fallback" style="display:none;">🌸</div>
    </div>
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">⭐</div>
  </div>

  <h1 class="name">твой ник тут</h1>
  <p class="tagline">короткое описание себя<br>или девиз — сюда ✧</p>

  <ul class="links" id="links-list"></ul>

  <footer>сделано с <span>♥</span> в аниме-стиле</footer>
</main>

<script>
/* ============================================================
   🔗 ССЫЛКИ — редактируй только этот массив
   Чтобы ДОБАВИТЬ ссылку — скопируй один объект { ... } и вставь
   Чтобы УДАЛИТЬ ссылку — удали соответствующий объект { ... }
   icon: "tiktok" | "discord" | "telegram" | "youtube" | "instagram"
       | "twitter" | "twitch" | "vk" | "link" (универсальная иконка)
   ============================================================ */
const LINKS = [
  { name: "TikTok",        url: "https://www.tiktok.com/@твой_ник",     icon: "tiktok",   color: "#ff5f96" },
  { name: "Discord сервер", url: "https://discord.gg/твой_инвайт",       icon: "discord",  color: "#7d8fff" },
  { name: "Telegram канал", url: "https://t.me/твой_канал",              icon: "telegram", color: "#7de8e0" },
  // { name: "YouTube", url: "https://youtube.com/@channel", icon: "youtube", color: "#ff5f5f" },
  // { name: "Instagram", url: "https://instagram.com/username", icon: "instagram", color: "#e88cf0" },
];

const ICONS = {
  tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.4 2.2 2 3.9 4.4 4.2v3c-1.6 0-3.1-.5-4.4-1.4v6.8c0 3.5-2.8 6.4-6.4 6.4S3.7 18.1 3.7 14.6c0-3.4 2.6-6.1 6-6.4v3.1c-1.6.3-2.9 1.7-2.9 3.3 0 1.9 1.5 3.4 3.4 3.4s3.4-1.5 3.4-3.4V3h2.9z"/></svg>',
  discord: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 5.4C18.9 4.7 17.4 4.2 15.9 4c-.2.4-.4.8-.6 1.3-1.6-.2-3.2-.2-4.8 0-.1-.5-.3-.9-.6-1.3-1.5.2-3 .7-4.4 1.4C2.9 9 2.2 12.5 2.5 16c1.7 1.3 3.3 2 4.9 2.5.4-.5.7-1.1 1-1.7-.6-.2-1.1-.5-1.6-.8.1-.1.3-.2.4-.3 3.1 1.4 6.4 1.4 9.4 0 .1.1.3.2.4.3-.5.3-1.1.6-1.6.8.3.6.6 1.2 1 1.7 1.6-.5 3.2-1.2 4.9-2.5.4-4-.6-7.5-2.5-10.6zM9.3 13.8c-.9 0-1.7-.9-1.7-1.9s.7-1.9 1.7-1.9 1.7.9 1.7 1.9-.8 1.9-1.7 1.9zm5.4 0c-.9 0-1.7-.9-1.7-1.9s.7-1.9 1.7-1.9 1.7.9 1.7 1.9-.8 1.9-1.7 1.9z"/></svg>',
  telegram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.6 18.6 20c-.2 1-1 1.2-1.8.8l-5-3.7-2.4 2.3c-.3.3-.5.5-1 .5l.4-5.1L18.4 6.6c.4-.4-.1-.6-.6-.2L6.7 13.6l-5-1.6c-1-.3-1-1 .2-1.5L20.6 3.6c.9-.3 1.6.2 1.3 1z"/></svg>',
  youtube: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12s0-3.2-.4-4.7c-.2-.9-.9-1.6-1.8-1.8C18.2 5 12 5 12 5s-6.2 0-7.8.5c-.9.2-1.6.9-1.8 1.8C2 8.8 2 12 2 12s0 3.2.4 4.7c.2.9.9 1.6 1.8 1.8C5.8 19 12 19 12 19s6.2 0 7.8-.5c.9-.2 1.6-.9 1.8-1.8.4-1.5.4-4.7.4-4.7zM10 15V9l5.2 3-5.2 3z"/></svg>',
  instagram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c2.7 0 3.1 0 4.1.1 1.1 0 1.8.2 2.5.5.7.3 1.2.6 1.7 1.1.5.5.9 1 1.1 1.7.3.7.5 1.4.5 2.5.1 1 .1 1.4.1 4.1s0 3.1-.1 4.1c0 1.1-.2 1.8-.5 2.5-.3.7-.6 1.2-1.1 1.7-.5.5-1 .9-1.7 1.1-.7.3-1.4.5-2.5.5-1 .1-1.4.1-4.1.1s-3.1 0-4.1-.1c-1.1 0-1.8-.2-2.5-.5-.7-.3-1.2-.6-1.7-1.1-.5-.5-.9-1-1.1-1.7-.3-.7-.5-1.4-.5-2.5C2 15.1 2 14.7 2 12s0-3.1.1-4.1c0-1.1.2-1.8.5-2.5.3-.7.6-1.2 1.1-1.7.5-.5 1-.9 1.7-1.1.7-.3 1.4-.5 2.5-.5C8.9 2 9.3 2 12 2zm0 1.8c-2.6 0-3 0-4 .1-.9 0-1.4.2-1.7.3-.4.2-.7.4-1 .7-.3.3-.5.6-.7 1-.1.3-.3.8-.3 1.7-.1 1-.1 1.4-.1 4s0 3 .1 4c0 .9.2 1.4.3 1.7.2.4.4.7.7 1 .3.3.6.5 1 .7.3.1.8.3 1.7.3 1 .1 1.4.1 4 .1s3 0 4-.1c.9 0 1.4-.2 1.7-.3.4-.2.7-.4 1-.7.3-.3.5-.6.7-1 .1-.3.3-.8.3-1.7.1-1 .1-1.4.1-4s0-3-.1-4c0-.9-.2-1.4-.3-1.7-.2-.4-.4-.7-.7-1-.3-.3-.6-.5-1-.7-.3-.1-.8-.3-1.7-.3-1-.1-1.4-.1-4-.1zm0 4.5a3.7 3.7 0 1 1 0 7.4 3.7 3.7 0 0 1 0-7.4zm0 1.8a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 0 0 0-3.8zm4.6-2a.9.9 0 1 1 0 1.8.9.9 0 0 1 0-1.8z"/></svg>',
  twitter: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.2 3h3.2l-7 8 8.2 10h-6.4l-5-6.5L4.9 21H1.7l7.5-8.6L1.3 3h6.6l4.5 6z"/></svg>',
  twitch: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 2 2.5 6v13h5V21l3-2h4l5-5V2H4zm14.5 11-3 3h-4l-3 2v-2H5.5V3.5h13V13z"/><path d="M15 6.5h1.8v5H15zM10.5 6.5h1.8v5h-1.8z"/></svg>',
  vk: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.2 17.5c-6.5 0-10.2-4.5-10.4-11.9h3.3c.1 5.4 2.5 7.7 4.3 8.1V5.6h3.1v4.7c1.8-.2 3.7-2.3 4.3-4.7h3.1c-.5 2.9-2.6 5-4.1 5.9 1.5.7 3.9 2.6 4.8 5.9h-3.4c-.7-2.3-2.4-4-4.7-4.3v4.3h-.3z"/></svg>',
  link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1-1"/></svg>'
};

function renderLinks(){
  const list = document.getElementById('links-list');
  list.innerHTML = '';
  LINKS.forEach(link => {
    const li = document.createElement('li');
    li.className = 'link-item';
    const iconSvg = ICONS[link.icon] || ICONS.link;
    li.innerHTML = `
      <a href="${link.url}" target="_blank" rel="noopener noreferrer" style="--lc:${link.color || '#ff8fb3'}">
        <span class="link-icon">${iconSvg}</span>
        <span class="link-label">${link.name}</span>
        <span class="link-arrow">→</span>
      </a>`;
    list.appendChild(li);
  });
}
renderLinks();

/* лепестки сакуры */
(function petals(){
  const wrap = document.getElementById('petals');
  const count = window.innerWidth < 500 ? 10 : 16;
  const petalSvg = '<svg viewBox="0 0 20 20"><path fill="currentColor" d="M10 0C10 6 14 8 20 10c-6 2-10 4-10 10C10 14 6 12 0 10c6-2 10-4 10-10z"/></svg>';
  const colors = ['var(--pink)','var(--lav)','var(--cyan)'];
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random()*100 + 'vw';
    p.style.color = colors[i % colors.length];
    p.style.opacity = (0.4 + Math.random()*0.4).toFixed(2);
    const size = 10 + Math.random()*10;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.setProperty('--drift', (Math.random()*120 - 60) + 'px');
    p.style.animationDuration = (9 + Math.random()*10) + 's';
    p.style.animationDelay = (Math.random()*10) + 's';
    p.innerHTML = petalSvg;
    wrap.appendChild(p);
  }
})();
</script>
</body>
</html>
